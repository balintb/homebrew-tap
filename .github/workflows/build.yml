name: Build
on: push

jobs:
  json:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: brew info --json
      run: |
        taps_dir="$(brew --repository)/Library/Taps/balintb"
        mkdir -p "$taps_dir"
        rm -rf "$taps_dir/homebrew-tap"
        ln -s "$GITHUB_WORKSPACE" "$taps_dir/homebrew-tap"

        rm -rf Info
        mkdir -p Info
        for formula in Formula/*.rb; do
          name=$(basename "$formula" .rb)
          brew info --json "balintb/tap/$name" \
            | jq '.[0]? // .' > "Info/${name}.json"
        done

    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'Generated formula JSON: `brew info --json <formula>`'
        file_pattern: Info

